*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;min-height:100vh;font-family:'DM Sans',sans-serif;color:#e8e4dc;-webkit-text-size-adjust:100%}
.app{max-width:900px;margin:0 auto;padding:40px 24px 80px}
.header{text-align:center;margin-bottom:40px}
.header-label{font-size:11px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:#c8a96e;margin-bottom:12px}

.lang-bar{display:flex;justify-content:center;margin-bottom:32px}
.lang-toggle{display:flex;gap:2px;background:#1a1c24;border:1px solid #2a2d38;border-radius:8px;padding:2px}
.lang-btn{background:transparent;border:none;border-radius:6px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#6a6560;cursor:pointer;transition:all .2s}
.lang-btn.active{background:#c8a96e;color:#0f1117}
.lang-btn:hover:not(.active){color:#a0998e}
.hero{background:linear-gradient(135deg,#1a1c24,#1e2030);border:1px solid #2a2d38;border-radius:20px;padding:36px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(200,169,110,.08),transparent 70%);pointer-events:none}
.hero-name{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,5vw,42px);font-weight:700;color:#f5f0e8;line-height:1.1;margin-bottom:8px}
.hero-dates{font-size:14px;color:#c8a96e;margin-bottom:24px;letter-spacing:.5px}
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.25);border-radius:100px;padding:6px 14px;font-size:13px;color:#e8e4dc}
.chip b{color:#c8a96e;font-size:11px;margin-left:4px;font-weight:500}
.sec{background:#1a1c24;border:1px solid #2a2d38;border-radius:16px;padding:28px;margin-bottom:16px}
.sec-title{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#c8a96e;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:1px;background:#2a2d38}
.dir-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6a6560;margin-bottom:10px}
.fl{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid #2a2d38}
.fl:last-child{border-bottom:none}
.fp .tm{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#f5f0e8;line-height:1}
.fp .cd{font-size:12px;color:#7a7670;margin-top:2px}
.fp .ct{font-size:13px;color:#a0998e}
.fp .dt{font-size:11px;color:#6a6560;margin-top:2px}
.fa{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 8px}
.fa .fn{font-size:11px;color:#c8a96e;font-weight:500;white-space:nowrap}
.fa .ln{display:flex;align-items:center;gap:6px;width:100%}
.fa .ln::before,.fa .ln::after{content:'';flex:1;height:1px;background:#3a3d48}
.fa .dot{color:#c8a96e;font-size:14px}
.fa .al{font-size:11px;color:#6a6560}
.conn{background:#0f1117;border:1px dashed #2a2d38;border-radius:10px;padding:12px 16px;margin:8px 0;display:flex;align-items:center;gap:12px}
.conn .ci{font-size:18px}
.conn .cl{font-size:13px;color:#a0998e}
.conn .ctm{font-family:'Cormorant Garamond',serif;font-size:20px;color:#80c870;font-weight:600}

.hr-dash{border:none;border-top:1px dashed #2a2d38;margin:4px 0}
.hn{font-family:'Cormorant Garamond',serif;font-size:22px;color:#f5f0e8;font-weight:600;margin-bottom:4px}
.ha{font-size:13px;color:#7a7670;margin-bottom:16px;text-decoration:none;display:block}
.hg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}

.sb{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}

<div class="sb"><button class="btn" onclick="copyAll()"><span id="cpbtn">${t.cp}</span></button></div>
`;}

function copyAll(){
const d=D[lang],t=d.L;
const tx=[d.dest,d.df+" – "+d.dt+" ("+d.n+" "+t.nt.toLowerCase()+")","",...d.trv.map(v=>v.n+" ("+v.r+")"),"","--- "+t.fl+" ---",...d.fl.map(f=>(f.d==="out"?"→ ":"← ")+f.fn+" | "+f.f+" → "+f.t+" | "+f.dt2+" "+f.dp+"–"+f.ar),"",...d.cn.map(c=>"⏱ "+c.lb+": "+c.dur+" — "+c.dt),"","--- "+t.acc+" ---",d.ht.nm,d.ht.ad,t.rm+": "+d.ht.rm,t.cf+": "+d.ht.cf,t.ci+": "+d.ht.ci+" | "+t.co+": "+d.ht.co,"","--- "+t.em+" ---",...d.em.map(x=>x.n+" ("+x.r+"): "+x.c),"","--- "+t.in2+" ---",...d.notes].join("\n");
navigator.clipboard.writeText(tx).then(()=>{document.getElementById("cpbtn").textContent="✓ "+d.L.cpd;setTimeout(()=>{document.getElementById("cpbtn").textContent=d.L.cp},2000)});
}
render();
</script>
